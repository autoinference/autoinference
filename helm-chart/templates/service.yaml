{{- if .Values.service }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "autoinference.fullname" . }}
  labels:
    {{- include "autoinference.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "autoinference.selectorLabels" . | nindent 4 }}
{{- end }}
